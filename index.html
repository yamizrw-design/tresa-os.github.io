/* TARJETA */

.card{

.section{

button{
padding:14px 20px;

border:none;

.whatsapp{

.map{

/* GLOBOS */

.balloon{
position:fixed;
bottom:-100px;
font-size:40px;
animation:flotar 10s linear infinite;
}

@keyframes flotar{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* DINOSAURIO CAMINANDO */

.dino{
position:fixed;
bottom:30px;
font-size:100px;
animation:caminar 18s linear infinite;
}

@keyframes caminar{
0%{right:-100px}
100%{right:110%}
}

/* VOLCAN */

.volcano{
position:fixed;
bottom:0;
right:10px;
font-size:200px;
animation:volcan 2s infinite;
}

@keyframes volcan{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

.lava{
position:fixed;
bottom:140px;
right:20px;
font-size:140px;
animation:lava 2s infinite;
}

@keyframes lava{
0%{opacity:1; transform:translateY(20)}
100%{opacity:0; transform:translateY(-8px)}
}

</style>
